name: Create Package Tags

# When a shared vX.Y.0 tag is pushed, automatically create package-specific tags.
# This allows coordinated releases while keeping each package with its own tag.

on:
  push:
    tags:
      - "v*" # Shared release tags (coordinator tags)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: 3

jobs:
  create-package-tags:
    name: Create package-specific tags
    runs-on: ubuntu-latest
    permissions:
      actions: write # Needed to dispatch package CD workflows for bot-created tags
      contents: write # Needed to create and push tags

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5.5.0
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix to get version
          VERSION=${TAG#v}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate that this is a .0 release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Validate coordinator tag format: must be exactly vX.Y.0 (no suffixes like -rc1)
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.0$ ]]; then
            echo "ERROR: Coordinator tag must match pattern ^v[0-9]+\.[0-9]+\.0$ (e.g., v1.2.0)"
            echo "Invalid tag: $TAG"
            echo ""
            echo "Coordinator tags must be for .0 releases only (vX.Y.0)."
            echo "Pre-release tags (e.g., v1.2.0-rc1) are not supported."
            echo ""
            echo "For bug-fix releases (X.Y.Z where Z > 0) or pre-releases, use package-specific tags:"
            echo "  - coordinax-v${VERSION}"
            echo "  - coordinax-api-v${VERSION}"
            echo "  - coordinax-astro-v${VERSION}"
            echo "  - coordinax-hypothesis-v${VERSION}"
            echo "  - coordinax-interop-astropy-v${VERSION}"
            exit 1
          fi

          echo "Valid coordinator tag: $TAG"

      - name: Create and push package-specific tags
        id: create_tags
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch all tags to check for existing package tags
          git fetch --tags

          # Get the commit SHA of the coordinator tag (works for annotated/lightweight tags)
          COORDINATOR_SHA=$(git rev-list -n 1 "$TAG")
          echo "Coordinator tag $TAG points to commit: $COORDINATOR_SHA"

          # Define package tags to create
          PACKAGES=(
            "coordinax"
            "coordinax-api"
            "coordinax-astro"
            "coordinax-hypothesis"
            "coordinax-interop-astropy"
          )
          TAGS_TO_PUSH=()

          COORDINAX_TAG_CREATED="false"
          COORDINAX_API_TAG_CREATED="false"
          COORDINAX_ASTRO_TAG_CREATED="false"
          COORDINAX_HYPOTHESIS_TAG_CREATED="false"
          COORDINAX_INTEROP_ASTROPY_TAG_CREATED="false"

          # Check and create each package tag
          for PACKAGE in "${PACKAGES[@]}"; do
            PACKAGE_TAG="${PACKAGE}-v${VERSION}"

            if git rev-parse "$PACKAGE_TAG" >/dev/null 2>&1; then
              # Tag exists - verify it points at the coordinator tag's commit
              EXISTING_SHA=$(git rev-list -n 1 "$PACKAGE_TAG")

              if [ "$EXISTING_SHA" = "$COORDINATOR_SHA" ]; then
                echo "Tag $PACKAGE_TAG already exists and points to correct commit ($EXISTING_SHA)"
              else
                echo "ERROR: Tag $PACKAGE_TAG already exists but points to wrong commit"
                echo "  Expected (coordinator tag $TAG): $COORDINATOR_SHA"
                echo "  Actual   ($PACKAGE_TAG):         $EXISTING_SHA"
                echo ""
                echo "This indicates a bad state - the coordinator tag was likely recreated"
                echo "on a new commit, but old package tags still point to the old commit."
                echo ""
                echo "To fix this, manually delete and recreate the package tag:"
                echo "  git tag -d $PACKAGE_TAG"
                echo "  git push origin :refs/tags/$PACKAGE_TAG"
                echo "  git tag $PACKAGE_TAG $COORDINATOR_SHA -m \"Release $PACKAGE ${VERSION}\""
                echo "  git push origin $PACKAGE_TAG"
                exit 1
              fi
            else
              echo "Creating tag $PACKAGE_TAG"
              git tag "$PACKAGE_TAG" "$COORDINATOR_SHA" -m "Release $PACKAGE ${VERSION} (auto-created from ${TAG})"
              TAGS_TO_PUSH+=("$PACKAGE_TAG")

              if [ "$PACKAGE" = "coordinax" ]; then
                COORDINAX_TAG_CREATED="true"
              fi
              if [ "$PACKAGE" = "coordinax-api" ]; then
                COORDINAX_API_TAG_CREATED="true"
              fi
              if [ "$PACKAGE" = "coordinax-astro" ]; then
                COORDINAX_ASTRO_TAG_CREATED="true"
              fi
              if [ "$PACKAGE" = "coordinax-hypothesis" ]; then
                COORDINAX_HYPOTHESIS_TAG_CREATED="true"
              fi
              if [ "$PACKAGE" = "coordinax-interop-astropy" ]; then
                COORDINAX_INTEROP_ASTROPY_TAG_CREATED="true"
              fi
            fi
          done

          # Push only newly created tags
          if [ ${#TAGS_TO_PUSH[@]} -eq 0 ]; then
            echo "All package tags already exist for version ${VERSION}"
            echo "This is expected for workflow re-runs"

            echo "trigger_coordinax_cd=false" >> "$GITHUB_OUTPUT"
            echo "coordinax_tag=coordinax-v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "coordinax_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"

            echo "trigger_coordinax_api_cd=false" >> "$GITHUB_OUTPUT"
            echo "coordinax_api_tag=coordinax-api-v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "coordinax_api_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"

            echo "trigger_coordinax_astro_cd=false" >> "$GITHUB_OUTPUT"
            echo "coordinax_astro_tag=coordinax-astro-v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "coordinax_astro_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"

            echo "trigger_coordinax_hypothesis_cd=false" >> "$GITHUB_OUTPUT"
            echo "coordinax_hypothesis_tag=coordinax-hypothesis-v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "coordinax_hypothesis_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"

            echo "trigger_coordinax_interop_astropy_cd=false" >> "$GITHUB_OUTPUT"
            echo "coordinax_interop_astropy_tag=coordinax-interop-astropy-v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "coordinax_interop_astropy_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Pushing ${#TAGS_TO_PUSH[@]} new tag(s): ${TAGS_TO_PUSH[*]}"
          git push origin "${TAGS_TO_PUSH[@]}"

          echo "Successfully created and pushed package-specific tags for version ${VERSION}"

          echo "trigger_coordinax_cd=${COORDINAX_TAG_CREATED}" >> "$GITHUB_OUTPUT"
          echo "coordinax_tag=coordinax-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "coordinax_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"

          echo "trigger_coordinax_api_cd=${COORDINAX_API_TAG_CREATED}" >> "$GITHUB_OUTPUT"
          echo "coordinax_api_tag=coordinax-api-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "coordinax_api_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"

          echo "trigger_coordinax_astro_cd=${COORDINAX_ASTRO_TAG_CREATED}" >> "$GITHUB_OUTPUT"
          echo "coordinax_astro_tag=coordinax-astro-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "coordinax_astro_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"

          echo "trigger_coordinax_hypothesis_cd=${COORDINAX_HYPOTHESIS_TAG_CREATED}" >> "$GITHUB_OUTPUT"
          echo "coordinax_hypothesis_tag=coordinax-hypothesis-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "coordinax_hypothesis_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"

          echo "trigger_coordinax_interop_astropy_cd=${COORDINAX_INTEROP_ASTROPY_TAG_CREATED}" >> "$GITHUB_OUTPUT"
          echo "coordinax_interop_astropy_tag=coordinax-interop-astropy-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "coordinax_interop_astropy_tag_sha=${COORDINATOR_SHA}" >> "$GITHUB_OUTPUT"

      - name: Trigger CD - coordinax for auto-created coordinax tag
        if: |
          steps.create_tags.outputs.trigger_coordinax_cd == 'true' ||
          (steps.create_tags.outputs.coordinax_tag != '' &&
          steps.create_tags.outputs.trigger_coordinax_cd == 'false')
        uses: ./.github/actions/dispatch-package-cd
        with:
          workflow_id: cd-coordinax.yml
          workflow_name: CD - coordinax
          tag_ref: ${{ steps.create_tags.outputs.coordinax_tag }}
          tag_sha: ${{ steps.create_tags.outputs.coordinax_tag_sha }}
          trigger_cd: ${{ steps.create_tags.outputs.trigger_coordinax_cd }}

      - name: Trigger CD - coordinax.api for auto-created coordinax-api tag
        if: |
          steps.create_tags.outputs.trigger_coordinax_api_cd == 'true' ||
          (steps.create_tags.outputs.coordinax_api_tag != '' &&
          steps.create_tags.outputs.trigger_coordinax_api_cd == 'false')
        uses: ./.github/actions/dispatch-package-cd
        with:
          workflow_id: cd-coordinax-api.yml
          workflow_name: CD - coordinax.api
          tag_ref: ${{ steps.create_tags.outputs.coordinax_api_tag }}
          tag_sha: ${{ steps.create_tags.outputs.coordinax_api_tag_sha }}
          trigger_cd: ${{ steps.create_tags.outputs.trigger_coordinax_api_cd }}

      - name: Trigger CD - coordinax.astro for auto-created coordinax-astro tag
        if: |
          steps.create_tags.outputs.trigger_coordinax_astro_cd == 'true' ||
          (steps.create_tags.outputs.coordinax_astro_tag != '' &&
          steps.create_tags.outputs.trigger_coordinax_astro_cd == 'false')
        uses: ./.github/actions/dispatch-package-cd
        with:
          workflow_id: cd-coordinax-astro.yml
          workflow_name: CD - coordinax.astro
          tag_ref: ${{ steps.create_tags.outputs.coordinax_astro_tag }}
          tag_sha: ${{ steps.create_tags.outputs.coordinax_astro_tag_sha }}
          trigger_cd: ${{ steps.create_tags.outputs.trigger_coordinax_astro_cd }}

      - name: Trigger CD - coordinax.hypothesis for auto-created coordinax-hypothesis tag
        if: |
          steps.create_tags.outputs.trigger_coordinax_hypothesis_cd == 'true' ||
          (steps.create_tags.outputs.coordinax_hypothesis_tag != '' &&
          steps.create_tags.outputs.trigger_coordinax_hypothesis_cd == 'false')
        uses: ./.github/actions/dispatch-package-cd
        with:
          workflow_id: cd-coordinax-hypothesis.yml
          workflow_name: CD - coordinax.hypothesis
          tag_ref: ${{ steps.create_tags.outputs.coordinax_hypothesis_tag }}
          tag_sha: ${{ steps.create_tags.outputs.coordinax_hypothesis_tag_sha }}
          trigger_cd: ${{ steps.create_tags.outputs.trigger_coordinax_hypothesis_cd }}

      - name: Trigger CD - coordinax.interop.astropy for auto-created coordinax-interop-astropy tag
        if: |
          steps.create_tags.outputs.trigger_coordinax_interop_astropy_cd == 'true' ||
          (steps.create_tags.outputs.coordinax_interop_astropy_tag != '' &&
          steps.create_tags.outputs.trigger_coordinax_interop_astropy_cd == 'false')
        uses: ./.github/actions/dispatch-package-cd
        with:
          workflow_id: cd-coordinax-interop-astropy.yml
          workflow_name: CD - coordinax.interop.astropy
          tag_ref: ${{ steps.create_tags.outputs.coordinax_interop_astropy_tag }}
          tag_sha: ${{ steps.create_tags.outputs.coordinax_interop_astropy_tag_sha }}
          trigger_cd: ${{ steps.create_tags.outputs.trigger_coordinax_interop_astropy_cd }}
