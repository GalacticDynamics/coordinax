name: CD Publish

# Stage B: privileged publish workflow.
# Triggered only after any Stage A CD workflow completes successfully.
# Downloads and validates the release-metadata artifact produced by Stage A before
# publishing, so that no repository code ever executes in a privileged context.
#
# Package identity and artifact names are derived from the triggering workflow name
# at runtime, so this single workflow handles all packages.

on:
  workflow_run:
    workflows:
      - "CD - coordinax"
      - "CD - coordinax.api"
      - "CD - coordinax.astro"
      - "CD - coordinax.hypothesis"
      - "CD - coordinax.interop.astropy"
    types:
      - completed

concurrency:
  # Include the triggering workflow name so runs for different packages on the
  # same commit never cancel each other.
  group: ${{ github.workflow }}-${{ github.event.workflow_run.name }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

env:
  FORCE_COLOR: 3

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      publish_testpypi: ${{ steps.validate.outputs.publish_testpypi }}
      publish_pypi: ${{ steps.validate.outputs.publish_pypi }}
      packages_artifact: ${{ steps.info.outputs.packages_artifact }}
      testpypi_url: ${{ steps.info.outputs.testpypi_url }}
      pypi_url: ${{ steps.info.outputs.pypi_url }}

    steps:
      - name: Derive artifact names from triggering workflow
        id: info
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Triggering workflow is named "CD - <package-name>" (e.g. "CD - coordinax.api").
            const workflowName = context.payload.workflow_run.name;
            const packageName = workflowName.replace(/^CD - /, "");

            // Metadata artifact uses dashes: release-metadata-coordinax-api
            const metadataArtifact = "release-metadata-" + packageName.replace(/\./g, "-");

            // Packages artifact keeps original dots: Packages-coordinax.api
            const packagesArtifact = "Packages-" + packageName;

            // tag prefix also uses dashes: coordinax-api-v*
            const tagPrefix = packageName.replace(/\./g, "-");

            core.setOutput("package_name", packageName);
            core.setOutput("metadata_artifact", metadataArtifact);
            core.setOutput("packages_artifact", packagesArtifact);
            core.setOutput("tag_prefix", tagPrefix);
            core.setOutput("testpypi_url", `https://test.pypi.org/p/${packageName}`);
            core.setOutput("pypi_url", `https://pypi.org/p/${packageName}`);

      - name: Download release metadata artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: ${{ steps.info.outputs.metadata_artifact }}
          path: .

      - name: Validate metadata and determine publish targets
        id: validate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXPECTED_PACKAGE: ${{ steps.info.outputs.package_name }}
          TAG_PREFIX: ${{ steps.info.outputs.tag_prefix }}
        with:
          script: |
            const fs = require("fs");
            const metadataPath = "release-metadata.json";

            if (!fs.existsSync(metadataPath)) {
              core.setFailed("Missing release-metadata.json artifact.");
              return;
            }

            let metadata;
            try {
              metadata = JSON.parse(fs.readFileSync(metadataPath, "utf8"));
            } catch (error) {
              core.setFailed(`Invalid release-metadata.json: ${error.message}`);
              return;
            }

            const { package: pkg, package_tag, head_sha, trigger_event } = metadata;
            const workflowRun = context.payload.workflow_run;
            const expectedPackage = process.env.EXPECTED_PACKAGE;
            const tagPrefix = process.env.TAG_PREFIX;

            // Validate package identity.
            if (pkg !== expectedPackage) {
              core.setFailed(`Unexpected package in artifact: ${pkg} (expected ${expectedPackage})`);
              return;
            }

            // Validate head SHA integrity: artifact must match the triggering run.
            if (typeof head_sha !== "string" || head_sha.length === 0) {
              core.setFailed("Invalid head_sha in artifact.");
              return;
            }
            if (head_sha !== workflowRun.head_sha) {
              core.setFailed(
                `Artifact head SHA ${head_sha} does not match workflow_run head SHA ${workflowRun.head_sha}.`,
              );
              return;
            }

            // Validate trigger_event field (sanity check; gating uses trusted workflow_run context).
            if (typeof trigger_event !== "string") {
              core.setFailed("Invalid trigger_event in artifact.");
              return;
            }

            // Determine which publish operations to perform.
            const hasTag = typeof package_tag === "string" && package_tag.length > 0;
            // Build regex dynamically: tagPrefix is e.g. "coordinax-api", so tag must be "coordinax-api-vX.Y.Z"
            const tagRegex = new RegExp(`^${tagPrefix}-v\\d+\\.\\d+\\.\\d+$`);
            const isValidTag = hasTag && tagRegex.test(package_tag);
            if (hasTag && !isValidTag) {
              core.setFailed(
                `Invalid package_tag in artifact: ${package_tag}.`,
              );
              return;
            }

            // Gate publish decisions on trusted GitHub event context, not artifact trigger_event.
            const trustedEvent = workflowRun.event;
            const trustedBranch = workflowRun.head_branch;

            // For tagged releases, verify the tag exists and resolves to the triggering commit.
            let verifiedTag = false;
            if (hasTag) {
              try {
                const refData = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${package_tag}`,
                });
                let tagTargetSha = refData.data.object.sha;
                // Dereference annotated tags.
                if (refData.data.object.type === "tag") {
                  const tagObj = await github.rest.git.getTag({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    tag_sha: tagTargetSha,
                  });
                  tagTargetSha = tagObj.data.object.sha;
                }
                if (tagTargetSha !== workflowRun.head_sha) {
                  core.setFailed(
                    `Tag ${package_tag} resolves to commit ${tagTargetSha}, ` +
                    `not workflow_run head SHA ${workflowRun.head_sha}.`,
                  );
                  return;
                }
                verifiedTag = true;
              } catch (error) {
                if (error.status === 404) {
                  core.setFailed(`Tag ${package_tag} does not exist in the repository.`);
                } else {
                  core.setFailed(`Failed to verify tag ${package_tag}: ${error.message}`);
                }
                return;
              }
            }

            let publishTestPyPI = false;
            let publishPyPI = false;

            if (verifiedTag) {
              // Tag verified via GitHub API: publish to both registries.
              publishTestPyPI = true;
              publishPyPI = true;
            } else if (trustedEvent === "push" && trustedBranch === "main" && !hasTag) {
              // Trusted push to main (no tag): publish to TestPyPI only.
              publishTestPyPI = true;
            }
            // workflow_dispatch or other events: no publish.

            core.info(`package_tag: ${package_tag || "(none)"}`);
            core.info(`trigger_event (artifact): ${trigger_event}`);
            core.info(`trusted_event: ${trustedEvent}, trusted_branch: ${trustedBranch}`);
            core.info(`publish_testpypi: ${publishTestPyPI}`);
            core.info(`publish_pypi: ${publishPyPI}`);

            core.setOutput("publish_testpypi", String(publishTestPyPI));
            core.setOutput("publish_pypi", String(publishPyPI));

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [validate]
    if: needs.validate.outputs.publish_testpypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: ${{ needs.validate.outputs.testpypi_url }}
    permissions:
      id-token: write
      actions: read

    steps:
      - name: Download built artifact to dist/
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: ${{ needs.validate.outputs.packages_artifact }}
          path: dist

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: [validate]
    if: needs.validate.outputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: ${{ needs.validate.outputs.pypi_url }}
    permissions:
      id-token: write
      attestations: write
      actions: read

    steps:
      - name: Download built artifact to dist/
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: ${{ needs.validate.outputs.packages_artifact }}
          path: dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
