name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Many color libraries just need this to be set to any value, but at least
  # one distinguishes color depth, where "3" -> "256-bit color".
  FORCE_COLOR: 3
  PYTHON_VERSIONS: '["3.11", "3.12", "3.13", "3.14"]'

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v6

      - name: Install
        run: uv sync --no-default-groups --group nox --group lint --locked

      - name: Lint & type-check
        run: uv run --frozen nox -s lint

  prepare_test_matrix:
    name: Prepare Test Matrix
    runs-on: ubuntu-latest
    needs: [format]
    permissions:
      contents: read
    outputs:
      python-all: ${{ steps.matrix.outputs.python-all }}
      python-edge: ${{ steps.matrix.outputs.python-edge }}
      exclude-args: ${{ steps.detect.outputs.exclude-args }}
      excluded-json: ${{ steps.detect.outputs.excluded-json }}
      status-json: ${{ steps.detect.outputs.status-json }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # `git diff <base>...HEAD` needs the base commit available locally.
          fetch-depth: 0

      - name: Detect optional package changes
        id: detect
        uses: ./.github/actions/detect-changed-packages
        with:
          config-file: .github/test-packages.json
          base-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'push' && github.event.before || 'origin/main' }}

      - name: Compute matrix versions
        id: matrix
        run: |
          python - <<'PY'
          import json
          import os

          versions = json.loads(os.environ["PYTHON_VERSIONS"])
          edge_versions = list(dict.fromkeys([versions[0], versions[-1]]))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"python-all={json.dumps(versions)}\n")
              f.write(f"python-edge={json.dumps(edge_versions)}\n")
          PY

  tests_linux:
    name: Check Python ${{ matrix.python-version }} on ubuntu-latest
    runs-on: ubuntu-latest
    needs: [prepare_test_matrix]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.prepare_test_matrix.outputs.python-all) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: uv sync --no-default-groups --group nox --group test --locked

      - name: Test package
        run: |
          uv run --no-sync nox -s test -- ${{ needs.prepare_test_matrix.outputs.exclude-args }} --cov --cov-report=xml --cov-report=term --durations=20 --arraydiff -m"not slow"

      - name: Upload coverage report
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  tests_nonlinux:
    name: Check Python ${{ matrix.python-version }} on ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [prepare_test_matrix]
    strategy:
      fail-fast: false
      matrix:
        runs-on: [macos-latest, windows-latest]
        python-version: ${{ fromJSON(needs.prepare_test_matrix.outputs.python-edge) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: uv sync --no-default-groups --group nox --group test --locked

      - name: Test package
        run: |
          uv run --no-sync nox -s test -- ${{ needs.prepare_test_matrix.outputs.exclude-args }} --cov --cov-report=xml --cov-report=term --durations=20 --arraydiff -m"not slow"

      - name: Upload coverage report
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  check_oldest:
    name: Check Oldest Dependencies
    runs-on: ${{ matrix.runs-on }}
    needs: [format]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test package
        run: >-
          uv run --group test-all --extra workspace --resolution lowest-direct pytest --cov
          --cov-report=xml --cov-report=term --durations=20

      - name: Upload coverage report
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  docs:
    name: Docs (No Warnings)
    runs-on: ubuntu-latest
    needs: [format]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v6

      # TODO: fix this
      # - name: Build docs (warnings as errors)
      # run: uv run --frozen nox -s docs -- -W
      - name: Build docs
        run: uv run --frozen nox -s docs

  status:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [format, tests_linux, tests_nonlinux, check_oldest]
    if: always()
    steps:
      - name: All required jobs passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
